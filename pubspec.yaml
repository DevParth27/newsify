name: newsify
description: "Newsify — news reader with clean architecture."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.1.3
  dio: ^5.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  timeago: ^3.7.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.1.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  logger: ^2.5.0
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  freezed: ^2.5.8
  build_runner: ^2.4.12
  json_serializable: ^6.9.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/appLogo.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/appLogo.png
  adaptive_icon_background: "#FAFAFA"
  adaptive_icon_foreground: assets/images/appLogo.png
  remove_alpha_ios: true
